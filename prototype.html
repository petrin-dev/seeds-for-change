// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav({ tweaks }) {
  const [open, setOpen] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const links = ['About','Services','Contact'];

  const navStyle = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
    background: scrolled ? 'rgba(247,245,240,0.97)' : 'transparent',
    backdropFilter: scrolled ? 'blur(8px)' : 'none',
    borderBottom: scrolled ? '1px solid rgba(79,105,77,0.15)' : 'none',
    transition: 'all 0.3s ease',
    padding: '0 2rem',
  };

  const scrollTo = (id) => {
    const el = document.getElementById(id.toLowerCase());
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top, behavior: 'smooth' });
    }
    setOpen(false);
  };

  return (
    <nav style={navStyle}>
      <div style={{maxWidth: 1100, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72}}>
        <button onClick={() => scrollTo('home')} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'0.6rem'}}>
          <img src="uploads/logo.png" alt="Seeds for Change logo" style={{height: 44, width: 'auto'}} />
          <span style={{fontWeight:700, fontSize:'1rem', letterSpacing:'0.02em', color: scrolled ? '#212121' : '#fff', textShadow: scrolled ? 'none' : '0 1px 4px rgba(0,0,0,0.4)', transition:'color 0.3s'}}>
            Seeds for Change
          </span>
        </button>

        {/* Desktop links */}
        <ul style={{display:'flex', gap:'2rem', listStyle:'none', alignItems:'center'}}>
          {links.map(l => (
            <li key={l} style={{display: window.innerWidth < 768 ? 'none' : 'block'}}>
              <button
                onClick={() => scrollTo(l)}
                style={{background:'none', border:'none', cursor:'pointer', fontFamily:'Lato,sans-serif', fontSize:'0.95rem', fontWeight:600, letterSpacing:'0.04em', color: scrolled ? '#212121' : '#fff', textShadow: scrolled ? 'none' : '0 1px 4px rgba(0,0,0,0.4)', transition:'color 0.3s', padding:'0.25rem 0', borderBottom:`2px solid transparent`}}
                onMouseEnter={e => e.target.style.borderBottomColor = tweaks.accentGold}
                onMouseLeave={e => e.target.style.borderBottomColor = 'transparent'}
              >{l}</button>
            </li>
          ))}
        </ul>

        {/* Mobile hamburger */}
        <button onClick={() => setOpen(o => !o)} style={{background:'none',border:'none',cursor:'pointer',color: scrolled ? '#212121' : '#fff',display:'none'}} className="hamburger">
          {open ? <IconX /> : <IconMenu />}
        </button>
      </div>

      {/* Mobile menu */}
      {open && (
        <div style={{background:'#f7f5f0', padding:'1rem 2rem 1.5rem', borderTop:`3px solid ${tweaks.accentGreen}`}}>
          {links.map(l => (
            <button key={l} onClick={() => scrollTo(l)} style={{display:'block', width:'100%', textAlign:'left', background:'none', border:'none', cursor:'pointer', fontFamily:'Lato,sans-serif', fontSize:'1.1rem', fontWeight:600, color:'#212121', padding:'0.75rem 0', borderBottom:'1px solid rgba(79,105,77,0.1)'}}>
              {l}
            </button>
          ))}
        </div>
      )}

      <style>{`
        @media (max-width: 768px) {
          .hamburger { display: block !important; }
          nav ul li { display: none !important; }
        }
      `}</style>
    </nav>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <Nav tweaks={t} />
      <Hero tweaks={t} />
      <IntroStrip tweaks={t} />
      <About tweaks={t} />
      <Services tweaks={t} />
      <Contact tweaks={t} />
      <Footer tweaks={t} />

      <TweaksPanel>
        <TweakSection label="Colors" />
        <TweakColor label="Sage Green" value={t.accentGreen} onChange={v => setTweak('accentGreen', v)} />
        <TweakColor label="Gold Accent" value={t.accentGold} onChange={v => setTweak('accentGold', v)} />
        <TweakColor label="Body Background" value={t.bodyBg} onChange={v => setTweak('bodyBg', v)} />
        <TweakColor label="Section Background" value={t.sectionBg} onChange={v => setTweak('sectionBg', v)} />

        <TweakToggle label="Rounded corners" value={t.roundedCards} onChange={v => setTweak('roundedCards', v)} />
      </TweaksPanel>
    </>
  );
}
